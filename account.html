  <div class="modal" id="accountPasswordModal">

<div class="modal-box">

<div class="modal-header">
<div class="modal-title">تغيير كلمة مرور الحساب</div>
<button class="close-btn" onclick="closeAccountPasswordModal()">✕</button>
</div>

<div class="form-box">

<label>كلمة المرور الحالية</label>
<input type="password" id="oldAccountPassword">

<label>كلمة المرور الجديدة</label>
<input type="password" id="newAccountPassword">

<label>كود التحقق من البريد</label>
<input type="text" id="accountPasswordCode">

<button class="form-action" onclick="sendAccountPasswordCode()">
إرسال كود التحقق
</button>

<button class="form-action" onclick="changeAccountPassword()">
تغيير كلمة المرور
</button>

</div>

<div class="status" id="accountPasswordStatus"></div>

</div>
</div>
  function openAccountPasswordModal(){
document.getElementById("accountPasswordModal").classList.add("active");
}

function closeAccountPasswordModal(){
document.getElementById("accountPasswordModal").classList.remove("active");
}

function showAccountPasswordStatus(text,color){
const box=document.getElementById("accountPasswordStatus");
box.innerText=text;
box.style.color=color;
  }
  async function sendAccountPasswordCode(){

const email=localStorage.getItem("loggedInEmail")||"";

if(!email){
showAccountPasswordStatus("يجب تسجيل الدخول","#ff8080");
return;
}

try{

const res=await fetch("/send-reset-password-code",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
});

const data=await res.json();
showAccountPasswordStatus(data.message,"#6cff9f");

}catch(error){

showAccountPasswordStatus("خطأ في الاتصال","#ff8080");

}

}

async function changeAccountPassword(){

const email=localStorage.getItem("loggedInEmail")||"";
const oldPassword=document.getElementById("oldAccountPassword").value.trim();
const newPassword=document.getElementById("newAccountPassword").value.trim();
const code=document.getElementById("accountPasswordCode").value.trim();

if(!email||!oldPassword||!newPassword||!code){
showAccountPasswordStatus("املأ كل البيانات","#ff8080");
return;
}

try{

const res=await fetch("/change-account-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
oldPassword,
newPassword,
code
})
});

const data=await res.json();
showAccountPasswordStatus(data.message,"#6cff9f");

}catch(error){

showAccountPasswordStatus("خطأ في الاتصال","#ff8080");

}

  }
