<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crypto - إنشاء حساب</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma, Arial;
}

body{
background:linear-gradient(180deg,#071131,#08122e);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#0b1535;
padding:30px 20px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
font-size:40px;
color:#1cc4ff;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#9fb0d3;
margin-bottom:25px;
line-height:1.7;
}

label{
display:block;
margin-bottom:6px;
margin-top:15px;
}

input{
width:100%;
height:50px;
border:none;
border-radius:12px;
padding:0 15px;
background:#06122b;
color:white;
font-size:15px;
}

input::placeholder{
color:#8896b3;
}

button{
width:100%;
height:50px;
border:none;
border-radius:14px;
margin-top:10px;
background:linear-gradient(90deg,#1cc4ff,#7d3cff);
color:white;
font-size:16px;
cursor:pointer;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.verify-row{
display:flex;
gap:10px;
margin-top:10px;
}

.verify-row input{
flex:1;
}

.verify-row button{
width:130px;
}

.password-wrap{
position:relative;
}

.password-wrap input{
padding-left:90px;
}

.toggle-password{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
width:70px;
height:34px;
border:none;
border-radius:10px;
background:#12315f;
color:#fff;
font-size:12px;
cursor:pointer;
}

.status{
margin-top:12px;
font-size:14px;
text-align:center;
min-height:22px;
line-height:1.7;
color:#7ed8ff;
}

.register-btn{
height:60px;
font-size:18px;
margin-top:20px;
}

.footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#9fb0d3;
}

.footer a{
color:#1cc4ff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Sudan Crypto</div>
<div class="subtitle">إنشاء حساب جديد</div>

<form id="registerForm">

<label>الاسم الكامل</label>
<input type="text" id="fullname" placeholder="أدخل اسمك الكامل" required>

<label>البريد الإلكتروني</label>
<input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
<div class="verify-row">

<button type="button" id="sendCodeBtn" onclick="sendVerificationCode()">
إرسال كود التحقق
</button>

</div>

<div class="verify-row">

<input type="text" id="code" placeholder="أدخل كود التحقق">

<button type="button" onclick="verifyCode()">
تحقق
</button>

</div>

<label>كلمة المرور</label>

<div class="password-wrap">

<input type="password" id="password" placeholder="أنشئ كلمة مرور قوية" required>

<button type="button" class="toggle-password"
onclick="togglePassword('password',this)">
إظهار
</button>

</div>

<label>تأكيد كلمة المرور</label>

<div class="password-wrap">

<input type="password" id="confirmPassword"
placeholder="أعد إدخال كلمة المرور" required>

<button type="button" class="toggle-password"
onclick="togglePassword('confirmPassword',this)">
إظهار
</button>

</div>

<label>كود الإحالة (اختياري)</label>

<input type="text" id="referralCode"
placeholder="اتركه فارغ إذا لم يكن لديك كود">

<div class="status" id="statusMsg"></div>

<button type="submit" class="register-btn">
إنشاء الحساب
</button>

</form>

<div class="footer">

لديك حساب بالفعل؟
<a href="login.html">تسجيل الدخول</a>

</div>

</div>
<script>

let emailVerified = false;

const msg = document.getElementById("statusMsg");

function showMessage(text,color){

msg.innerText=text;
msg.style.color=color;

}

function togglePassword(inputId,btn){

const input=document.getElementById(inputId);

if(input.type==="password"){

input.type="text";
btn.innerText="إخفاء";

}else{

input.type="password";
btn.innerText="إظهار";

}

}

async function sendVerificationCode(){

const email=document.getElementById("email").value.trim();

if(!email){

showMessage("أدخل البريد الإلكتروني أولاً","#ff8080");
return;

}

try{

const res=await fetch("/send-register-code",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email})

});

const data=await res.json();

showMessage(data.message || "تم إرسال الكود","#7ed8ff");

}catch(err){

console.log(err);
showMessage("خطأ في الاتصال بالسيرفر","#ff8080");

}

}
  async function verifyCode(){

const email=document.getElementById("email").value.trim();
const code=document.getElementById("code").value.trim();

if(!email || !code){

showMessage("أدخل البريد والكود","#ff8080");
return;

}

try{

const res=await fetch("/verify-register-code",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email,code})

});

const data=await res.json();

if(data.message.includes("تم التحقق")){

emailVerified=true;
showMessage("تم التحقق من البريد","#6cff9f");

}else{

emailVerified=false;
showMessage(data.message || "الكود غير صحيح","#ff8080");

}

}catch(err){

console.log(err);
showMessage("خطأ في الاتصال بالسيرفر","#ff8080");

}

}

document.getElementById("registerForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const fullname=document.getElementById("fullname").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
const confirmPassword=document.getElementById("confirmPassword").value.trim();
const referralCode=document.getElementById("referralCode").value.trim();

if(!emailVerified){

showMessage("يجب التحقق من البريد أولاً","#ff8080");
return;

}

if(password!==confirmPassword){

showMessage("كلمتا المرور غير متطابقتين","#ff8080");
return;

}

try{

const res=await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:fullname,
email:email,
password:password,
referralCode:referralCode

})

});

const data=await res.json();

if(data.message.includes("تم إنشاء الحساب")){

showMessage("تم إنشاء الحساب بنجاح","#6cff9f");

setTimeout(()=>{

window.location.href="login.html";

},1200);

}else{

showMessage(data.message || "فشل التسجيل","#ff8080");

}

}catch(err){

console.log(err);
showMessage("خطأ في الاتصال بالسيرفر","#ff8080");

}

});

</script>

</body>
</html>
