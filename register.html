<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crypto - إنشاء حساب</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Tahoma, Arial;
}

body{
  background:linear-gradient(180deg,#071131,#08122e);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  background:#0b1535;
  padding:30px 20px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
  text-align:center;
  font-size:40px;
  color:#1cc4ff;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:#9fb0d3;
  margin-bottom:25px;
  line-height:1.7;
}

label{
  display:block;
  margin-bottom:6px;
  margin-top:15px;
}

input{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  padding:0 15px;
  background:#06122b;
  color:white;
  font-size:15px;
}

input::placeholder{
  color:#8896b3;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  background:linear-gradient(90deg,#1cc4ff,#7d3cff);
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.verify-box{
  margin-top:10px;
}

.verify-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.verify-row input{
  flex:1;
}

.verify-row button{
  width:120px;
}

.password-wrap{
  position:relative;
}

.password-wrap input{
  padding-left:90px;
}

.toggle-password{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  width:70px;
  height:34px;
  margin:0;
  border:none;
  border-radius:10px;
  background:#12315f;
  color:#fff;
  font-size:12px;
  cursor:pointer;
}

.password-note{
  margin-top:8px;
  font-size:12px;
  color:#9fb0d3;
  line-height:1.7;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:#7ed8ff;
  text-align:center;
  min-height:22px;
  line-height:1.7;
}

.register-btn{
  height:60px;
  font-size:18px;
  margin-top:20px;
}

.footer{
  margin-top:20px;
  text-align:center;
  font-size:14px;
  color:#9fb0d3;
}

.footer a{
  color:#1cc4ff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">Sudan Crypto</div>
  <div class="subtitle">منصة الاستثمار الآمنة</div>

  <form id="registerForm">

    <label>الاسم الكامل</label>
    <input type="text" id="fullname" placeholder="أدخل اسمك الكامل" required>

    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>

    <div class="verify-box">
      <button type="button" id="sendCodeBtn" onclick="sendCode()">إرسال كود التحقق</button>

      <div class="verify-row">
        <input type="text" id="code" placeholder="أدخل كود التحقق">
        <button type="button" onclick="verifyCode()">تحقق</button>
      </div>

      <div class="status" id="statusMsg"></div>
    </div>

    <label>كلمة المرور</label>
    <div class="password-wrap">
      <input type="password" id="password" placeholder="أنشئ كلمة مرور قوية" required>
      <button type="button" class="toggle-password" onclick="togglePassword('password', this)">إظهار</button>
    </div>
    <div class="password-note">
      يجب أن تكون كلمة المرور 8 خانات على الأقل وتحتوي على حرف كبير وحرف صغير ورقم ورمز واحد مثل @ أو $ أو !
    </div>

    <label>تأكيد كلمة المرور</label>
    <div class="password-wrap">
      <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور" required>
      <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">إظهار</button>
    </div>

    <label>كود الإحالة (اختياري)</label>
    <input type="text" id="referralCode" placeholder="اتركه فارغ إذا لم يكن لديك كود">

    <button type="submit" class="register-btn">إنشاء الحساب</button>
  </form>

  <div class="footer">
    هل لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
  </div>

</div>

<script>
let verified = false;
let time = 60;
let timer = null;

const msg = document.getElementById("statusMsg");
const sendCodeBtn = document.getElementById("sendCodeBtn");

function showMessage(text, color) {
  msg.innerText = text;
  msg.style.color = color;
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);

  if (input.type === "password") {
    input.type = "text";
    btn.innerText = "إخفاء";
  } else {
    input.type = "password";
    btn.innerText = "إظهار";
  }
}

async function sendCode() {
  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!fullname || !email || !password) {
    showMessage("أدخل الاسم والبريد وكلمة المرور أولاً", "#ff8080");
    return;
  }

  try {
    const res = await fetch("/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: fullname,
        email: email,
        password: password
      })
    });

    const data = await res.json();
    const message = data.message || "";

    if (message.includes("تم إرسال كود التحقق")) {
      verified = false;
      showMessage(message, "#7ed8ff");
      startCountdown();
      return;
    }

    if (message.includes("مسجل بالفعل")) {
      verified = false;
      showMessage(message, "#ff8080");
      return;
    }

    verified = false;
    showMessage(message || "فشل إنشاء الحساب", "#ff8080");

  } catch (error) {
    console.log(error);
    verified = false;
    showMessage("حصل خطأ في الاتصال بالسيرفر", "#ff8080");
  }
}

function startCountdown() {
  clearInterval(timer);
  time = 60;
  sendCodeBtn.disabled = true;

  timer = setInterval(function () {
    sendCodeBtn.innerText = "إعادة الإرسال (" + time + " ثانية)";
    showMessage("تم إرسال كود التحقق (" + time + " ثانية)", "#7ed8ff");
    time--;

    if (time < 0) {
      clearInterval(timer);
      sendCodeBtn.disabled = false;
      sendCodeBtn.innerText = "إرسال كود التحقق";
      showMessage("يمكنك إعادة إرسال الكود الآن", "#6cff9f");
    }
  }, 1000);
}

async function verifyCode() {
  const email = document.getElementById("email").value.trim();
  const code = document.getElementById("code").value.trim();

  if (!email || !code) {
    showMessage("أدخل البريد وكود التحقق", "#ff8080");
    return;
  }

  try {
    const res = await fetch("/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        code: code
      })
    });

    const data = await res.json();
    const message = data.message || "";

    if (message.includes("تم التحقق")) {
      verified = true;
      showMessage(message, "#6cff9f");
    } else {
      verified = false;
      showMessage(message || "الكود غير صحيح", "#ff8080");
    }
  } catch (error) {
    console.log(error);
    verified = false;
    showMessage("حصل خطأ في الاتصال بالسيرفر", "#ff8080");
  }
}

document.getElementById("registerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!fullname || !email || !password || !confirmPassword) {
    showMessage("املأ كل البيانات المطلوبة", "#ff8080");
    return;
  }

  if (password !== confirmPassword) {
    showMessage("كلمتا المرور غير متطابقتين", "#ff8080");
    return;
  }

  if (!verified) {
    showMessage("يجب التحقق من البريد الإلكتروني أولاً", "#ff8080");
    return;
  }

  showMessage("تم إنشاء الحساب بنجاح، سيتم تحويلك إلى تسجيل الدخول...", "#6cff9f");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);
});
</script>

</body>
</html>
