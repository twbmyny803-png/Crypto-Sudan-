<script>
let verified = false;
let time = 60;
let timer = null;

const msg = document.getElementById("statusMsg");
const sendCodeBtn = document.getElementById("sendCodeBtn");

function showMessage(text, color) {
  msg.innerText = text;
  msg.style.color = color;
}

/* قراءة كود الإحالة من الرابط */
function loadReferralFromURL() {
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");

  if (ref) {
    const input = document.getElementById("referralCode");
    input.value = ref.toUpperCase();
    input.readOnly = true;
  }
}

loadReferralFromURL();

/* إظهار كلمة السر */
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);

  if (input.type === "password") {
    input.type = "text";
    btn.innerText = "إخفاء";
  } else {
    input.type = "password";
    btn.innerText = "إظهار";
  }
}

/* إرسال كود التحقق */
async function sendCode() {
  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const referralCode = document.getElementById("referralCode").value.trim();

  if (!fullname || !email || !password) {
    showMessage("أدخل الاسم والبريد وكلمة المرور أولاً", "#ff8080");
    return;
  }

  try {
    const res = await fetch("/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: fullname,
        email: email,
        password: password,
        referralCode: referralCode
      })
    });

    const data = await res.json();
    const message = data.message || "";

    if (message.includes("تم إرسال كود التحقق")) {
      verified = false;
      showMessage(message, "#7ed8ff");
      startCountdown();
      return;
    }

    if (message.includes("مسجل بالفعل")) {
      verified = false;
      showMessage(message, "#ff8080");
      return;
    }

    verified = false;
    showMessage(message || "فشل إنشاء الحساب", "#ff8080");

  } catch (error) {
    console.log(error);
    verified = false;
    showMessage("حصل خطأ في الاتصال بالسيرفر", "#ff8080");
  }
}

function startCountdown() {
  clearInterval(timer);
  time = 60;
  sendCodeBtn.disabled = true;

  timer = setInterval(function () {
    sendCodeBtn.innerText = "إعادة الإرسال (" + time + " ثانية)";
    showMessage("تم إرسال كود التحقق (" + time + " ثانية)", "#7ed8ff");
    time--;

    if (time < 0) {
      clearInterval(timer);
      sendCodeBtn.disabled = false;
      sendCodeBtn.innerText = "إرسال كود التحقق";
      showMessage("يمكنك إعادة إرسال الكود الآن", "#6cff9f");
    }
  }, 1000);
}

/* التحقق من الكود */
async function verifyCode() {
  const email = document.getElementById("email").value.trim();
  const code = document.getElementById("code").value.trim();

  if (!email || !code) {
    showMessage("أدخل البريد وكود التحقق", "#ff8080");
    return;
  }

  try {
    const res = await fetch("/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        code: code
      })
    });

    const data = await res.json();
    const message = data.message || "";

    if (message.includes("تم التحقق")) {
      verified = true;
      showMessage(message, "#6cff9f");
    } else {
      verified = false;
      showMessage(message || "الكود غير صحيح", "#ff8080");
    }
  } catch (error) {
    console.log(error);
    verified = false;
    showMessage("حصل خطأ في الاتصال بالسيرفر", "#ff8080");
  }
}

/* إنشاء الحساب */
document.getElementById("registerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!fullname || !email || !password || !confirmPassword) {
    showMessage("املأ كل البيانات المطلوبة", "#ff8080");
    return;
  }

  if (password !== confirmPassword) {
    showMessage("كلمتا المرور غير متطابقتين", "#ff8080");
    return;
  }

  if (!verified) {
    showMessage("يجب التحقق من البريد الإلكتروني أولاً", "#ff8080");
    return;
  }

  showMessage("تم إنشاء الحساب بنجاح، سيتم تحويلك إلى تسجيل الدخول...", "#6cff9f");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);
});
          </script>
