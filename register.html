<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crypto - إنشاء حساب</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Tahoma, Arial;
}

body{
  background:linear-gradient(180deg,#071131,#08122e);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  background:#0b1535;
  padding:30px 20px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
  text-align:center;
  font-size:40px;
  color:#1cc4ff;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:#9fb0d3;
  margin-bottom:25px;
}

label{
  display:block;
  margin-bottom:6px;
  margin-top:15px;
}

input{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  padding:0 15px;
  background:#06122b;
  color:white;
  font-size:15px;
}

input::placeholder{
  color:#8896b3;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  background:linear-gradient(90deg,#1cc4ff,#7d3cff);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.verify-box{
  margin-top:10px;
}

.verify-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.verify-row input{
  flex:1;
}

.verify-row button{
  width:120px;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:#7ed8ff;
  text-align:center;
  min-height:22px;
}

.register-btn{
  height:60px;
  font-size:18px;
  margin-top:20px;
}

.footer{
  margin-top:20px;
  text-align:center;
  font-size:14px;
  color:#9fb0d3;
}

.footer a{
  color:#1cc4ff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">Sudan Crypto</div>
  <div class="subtitle">منصة الاستثمار الآمنة</div>

  <form id="registerForm">

    <label>الاسم الكامل</label>
    <input type="text" id="fullname" placeholder="أدخل اسمك الكامل" required>

    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>

    <div class="verify-box">
      <button type="button" onclick="sendCode()">إرسال كود التحقق</button>

      <div class="verify-row">
        <input type="text" id="code" placeholder="أدخل كود التحقق">
        <button type="button" onclick="verifyCode()">تحقق</button>
      </div>

      <div class="status" id="statusMsg"></div>
    </div>

    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="أنشئ كلمة مرور قوية" required>

    <label>تأكيد كلمة المرور</label>
    <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور" required>

    <label>كود الإحالة (اختياري)</label>
    <input type="text" id="referralCode" placeholder="اتركه فارغ إذا لم يكن لديك كود">

    <button type="submit" class="register-btn">إنشاء الحساب</button>
  </form>

  <div class="footer">
    هل لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
  </div>

</div>

<script>
let verified = false;
let time = 60;
let timer = null;

const msg = document.getElementById("statusMsg");

async function sendCode() {
  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!fullname || !email || !password) {
    msg.innerText = "أدخل الاسم والبريد وكلمة المرور أولاً";
    msg.style.color = "#ff8080";
    return;
  }

  try {
    const res = await fetch("/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: fullname,
        email: email,
        password: password
      })
    });

    const data = await res.json();
    msg.innerText = data.message;

    if (res.ok) {
      msg.style.color = "#7ed8ff";
      verified = false;
      startCountdown();
    } else {
      msg.style.color = "#ff8080";
    }
  } catch (error) {
    console.log(error);
    msg.innerText = "حصل خطأ في الاتصال بالسيرفر";
    msg.style.color = "#ff8080";
  }
}

function startCountdown() {
  clearInterval(timer);
  time = 60;

  timer = setInterval(function () {
    msg.innerText = "تم إرسال كود التحقق (" + time + " ثانية)";
    msg.style.color = "#7ed8ff";
    time--;

    if (time < 0) {
      clearInterval(timer);
      msg.innerText = "يمكنك إعادة إرسال الكود الآن";
      msg.style.color = "#6cff9f";
    }
  }, 1000);
}

async function verifyCode() {
  const email = document.getElementById("email").value.trim();
  const code = document.getElementById("code").value.trim();

  if (!email || !code) {
    msg.innerText = "أدخل البريد وكود التحقق";
    msg.style.color = "#ff8080";
    return;
  }

  try {
    const res = await fetch("/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        code: code
      })
    });

    const data = await res.json();
    msg.innerText = data.message;

    if (data.message.includes("تم التحقق")) {
      verified = true;
      msg.style.color = "#6cff9f";
    } else {
      verified = false;
      msg.style.color = "#ff8080";
    }
  } catch (error) {
    console.log(error);
    msg.innerText = "حصل خطأ في الاتصال بالسيرفر";
    msg.style.color = "#ff8080";
  }
}

document.getElementById("registerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!fullname || !email || !password || !confirmPassword) {
    msg.innerText = "املأ كل البيانات المطلوبة";
    msg.style.color = "#ff8080";
    return;
  }

  if (password !== confirmPassword) {
    msg.innerText = "كلمتا المرور غير متطابقتين";
    msg.style.color = "#ff8080";
    return;
  }

  if (!verified) {
    msg.innerText = "يجب التحقق من البريد الإلكتروني أولاً";
    msg.style.color = "#ff8080";
    return;
  }

  msg.innerText = "تم إنشاء الحساب بنجاح";
  msg.style.color = "#6cff9f";
});
</script>

</body>
</html>
