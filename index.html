<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudan Crypto - تسجيل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(20, 25, 45, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 200, 0.2);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #00bfff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8899bb;
            font-size: 14px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #e0e6f0;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 20, 40, 0.6);
            border: 1px solid rgba(100, 150, 200, 0.2);
            border-radius: 12px;
            color: #e0e6f0;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: #6b7a8f;
        }

        input:focus {
            outline: none;
            background: rgba(10, 20, 40, 0.8);
            border-color: rgba(100, 150, 200, 0.4);
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00bfff 0%, #7b2cbf 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #8899bb;
            font-size: 14px;
        }

        .login-link a {
            color: #00bfff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #00d4ff;
            text-decoration: underline;
        }

        .terms-box {
            background: rgba(10, 20, 40, 0.4);
            border: 1px solid rgba(100, 150, 200, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            color: #8899bb;
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .logo-text {
                font-size: 36px;
            }

            input {
                padding: 12px 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-text">Sudan<br>Crypto</div>
            <div class="subtitle">منصة التداول الآمنة</div>
        </div>

        <form>
            <div class="form-group">
                <label for="fullname">الاسم الكامل</label>
                <input type="text" id="fullname" name="fullname" placeholder="أدخل اسمك الكامل" required>
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" placeholder="أنشئ كلمة مرور قوية" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">تأكيد كلمة المرور</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="أعد إدخال كلمة المرور" required>
            </div>

            <button type="submit" class="submit-btn">إنشاء الحساب</button>

            <div class="login-link">
                هل لديك حساب بالفعل؟ <a href="#">تسجيل الدخول</a>
            </div>

            <div class="terms-box">
                بإنشاء حسابك، فإنك توافق على شروط الخدمة وسياسة الخصوصية الخاصة بنا. جميع المعاملات محمية بأعلى معايير الأمان.
            </div>
        </form>
    </div>
</body>
</html>
