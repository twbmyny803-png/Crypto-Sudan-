<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudan Crypto - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(20, 25, 45, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 200, 0.2);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #00bfff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8899bb;
            font-size: 14px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #e0e6f0;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 20, 40, 0.6);
            border: 1px solid rgba(100, 150, 200, 0.2);
            border-radius: 12px;
            color: #e0e6f0;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: #6b7a8f;
        }

        input:focus {
            outline: none;
            background: rgba(10, 20, 40, 0.8);
            border-color: rgba(100, 150, 200, 0.4);
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.2);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 25px;
        }

        .forgot-password a {
            font-size: 12px;
            color: #8899bb;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #00bfff;
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00bfff 0%, #7b2cbf 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .verification-section {
            background: rgba(10, 20, 40, 0.4);
            border: 1px solid rgba(100, 150, 200, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .verification-section.active {
            display: block;
        }

        .verification-section h3 {
            color: #e0e6f0;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .verification-code-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 20, 40, 0.6);
            border: 1px solid rgba(100, 150, 200, 0.2);
            border-radius: 12px;
            color: #e0e6f0;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            text-align: center;
            letter-spacing: 2px;
        }

        .verification-code-input:focus {
            outline: none;
            background: rgba(10, 20, 40, 0.8);
            border-color: rgba(100, 150, 200, 0.4);
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.2);
        }

        .verify-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00bfff 0%, #7b2cbf 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.3);
        }

        .resend-code {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #8899bb;
        }

        .resend-code a {
            color: #00bfff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .resend-code a:hover {
            color: #00d4ff;
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #8899bb;
            font-size: 14px;
        }

        .register-link a {
            color: #00bfff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #00d4ff;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .logo-text {
                font-size: 36px;
            }

            input {
                padding: 12px 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-text">Sudan<br>Crypto</div>
            <div class="subtitle">منصة الاستثمار الآمنة</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
            </div>

            <div class="forgot-password">
                <a href="reset-password.html">هل نسيت كلمة السر؟</a>
            </div>

            <button type="button" class="submit-btn" onclick="sendVerificationCode()">تسجيل الدخول</button>

            <div class="verification-section" id="verificationSection">
                <h3>تم إرسال كود التحقق إلى بريدك الإلكتروني</h3>
                <input type="text" class="verification-code-input" id="verificationCode" placeholder="أدخل كود التحقق (6 أرقام)" maxlength="6">
                <button type="button" class="verify-btn" onclick="verifyCode()">تأكيد الكود</button>
                <div class="resend-code">
                    لم تستقبل الكود؟ <a onclick="resendCode()">إعادة الإرسال</a>
                </div>
            </div>

            <div class="register-link">
                ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
            </div>
        </form>
    </div>

    <script>
        function sendVerificationCode() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }

            console.log('إرسال كود التحقق إلى:', email);
            document.getElementById('verificationSection').classList.add('active');
            alert('تم إرسال كود التحقق إلى ' + email);
        }

        function verifyCode() {
            const code = document.getElementById('verificationCode').value;

            if (!code || code.length !== 6) {
                alert('الرجاء إدخال كود صحيح (6 أرقام)');
                return;
            }

            if (code === '123456') {
                alert('تم التحقق بنجاح! تسجيل الدخول...');
                window.location.href = 'dashboard.html';
            } else {
                alert('الكود غير صحيح');
            }
        }

        function resendCode() {
            const email = document.getElementById('email').value;
            console.log('إعادة إرسال الكود إلى:', email);
            alert('تم إعادة إرسال الكود إلى ' + email);
        }
    </script>
</body>
</html>
