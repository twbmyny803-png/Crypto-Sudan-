<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crypto</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tajawal, Arial;
}

body{
background:linear-gradient(180deg,#0a1d3a,#071431);
color:white;
padding-bottom:80px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#1cc4ff;
}

.icons{
display:flex;
gap:15px;
font-size:20px;
}

.notice{
margin:10px 20px;
padding:12px;
background:#0d1a3f;
border-radius:30px;
font-size:14px;
text-align:center;
}

.banner{
margin:20px;
border-radius:20px;
overflow:hidden;
}

.banner img{
width:100%;
border-radius:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
text-align:center;
gap:10px;
margin:20px;
}

.menu-item{
padding:15px;
background:#0c183c;
border-radius:20px;
}

.menu-item img{
width:40px;
margin-bottom:10px;
}

.menu-item p{
font-size:13px;
}

.section{
margin:20px;
}

.section-title{
font-size:18px;
margin-bottom:10px;
}

.movies{
display:flex;
gap:10px;
overflow:auto;
}

.movie{
min-width:120px;
}

.movie img{
width:100%;
border-radius:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#081532;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #162a5a;
}

.bottom-nav div{
text-align:center;
font-size:12px;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">Sudan Crypto</div>

<div class="icons">
🛍
🌐
🎧
</div>
</div>

<div class="notice">
ادعُ أصدقاءك واربح مكافآت مع منصة السودان كريبتو
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1639322537228-f710d846310a">
</div>

<div class="menu">

<div class="menu-item">
<img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
<p>دعوة صديق</p>
</div>

<div class="menu-item">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
<p>العضوية</p>
</div>

<div class="menu-item">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<p>شرح النظام</p>
</div>

<div class="menu-item">
<img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
<p>الشركاء</p>
</div>

</div>

<div class="section">
<div class="section-title">الأفلام الشائعة</div>

<div class="movies">

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/pFlaoHTZeyNkG83vxsAJiGzfSsa.jpg">
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/v2LilmCylr3bL9TCZSj6syjowZh.jpg">
</div>

</div>
</div>

<div class="bottom-nav">

<div>
🏠
<p>الرئيسية</p>
</div>

<div>
📢
<p>العروض</p>
</div>

<div>
📄
<p>السجل</p>
</div>

<div>
👤
<p>حسابي</p>
</div>

</div>

</body>
  </html>
