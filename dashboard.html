<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crypto</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tajawal, Arial;
}

body{
background:linear-gradient(180deg,#0a1d3a,#071431);
color:white;
padding-bottom:80px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#1cc4ff;
}

.icons{
display:flex;
gap:15px;
font-size:20px;
}

.notice{
margin:10px 20px;
padding:12px;
background:#0d1a3f;
border-radius:30px;
font-size:14px;
text-align:center;
}

.banner{
margin:20px;
border-radius:20px;
overflow:hidden;
}

.banner img{
width:100%;
border-radius:20px;
display:block;
}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
text-align:center;
gap:10px;
margin:20px;
}

.menu-link{
text-decoration:none;
color:white;
display:block;
}

.menu-item{
padding:15px;
background:#0c183c;
border-radius:20px;
min-height:110px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.menu-item img{
width:40px;
margin-bottom:10px;
}

.menu-item p{
font-size:13px;
line-height:1.5;
}

.section{
margin:20px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.section-title{
font-size:18px;
}

.more-link{
color:#d7e6ff;
text-decoration:none;
font-size:15px;
}

.movies{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:6px;
}

.movie{
min-width:120px;
}

.movie img{
width:100%;
border-radius:10px;
display:block;
}

.bottom-nav{
position:fixed;
bottom:0;
right:0;
left:0;
background:#081532;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #162a5a;
z-index:100;
}

.bottom-nav a{
text-align:center;
font-size:12px;
color:white;
text-decoration:none;
line-height:1.6;
}

.bottom-nav a.active{
color:#1cc4ff;
font-weight:bold;
}

@media (max-width: 520px){
.menu{
grid-template-columns:repeat(2,1fr);
}
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">Sudan Crypto</div>

  <div class="icons">
    🛍
    🌐
    🎧
  </div>
</div>

<div class="notice">
  ادعُ أصدقاءك واربح مكافآت مع منصة السودان كريبتو
</div>

<div class="banner">
  <img src="https://images.unsplash.com/photo-1639322537228-f710d846310a" alt="banner">
</div>

<div class="menu">

  <a href="#" class="menu-link">
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="">
      <p>دعوة صديق</p>
    </div>
  </a>

  <a href="membership.html" class="menu-link">
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="">
      <p>العضوية</p>
    </div>
  </a>

  <a href="#" class="menu-link">
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" alt="">
      <p>شرح النظام</p>
    </div>
  </a>

  <a href="#" class="menu-link">
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png" alt="">
      <p>الشركاء</p>
    </div>
  </a>

</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">الأفلام الشائعة</div>
    <a href="#" class="more-link">عرض المزيد</a>
  </div>

  <div class="movies">

    <div class="movie">
      <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg" alt="">
    </div>

    <div class="movie">
      <img src="https://image.tmdb.org/t/p/w500/pFlaoHTZeyNkG83vxsAJiGzfSsa.jpg" alt="">
    </div>

    <div class="movie">
      <img src="https://image.tmdb.org/t/p/w500/v2LilmCylr3bL9TCZSj6syjowZh.jpg" alt="">
    </div>

  </div>
</div>

<div class="bottom-nav">

  <a href="dashboard.html" class="active">
    🏠
    <p>الرئيسية</p>
  </a>

  <a href="offers.html">
    📢
    <p>العروض</p>
  </a>

  <a href="#">
    📄
    <p>السجل</p>
  </a>

  <a href="#">
    👤
    <p>حسابي</p>
  </a>

</div>

</body>
</html>
