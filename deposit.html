<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الإيداع</title>

<style>

body{
background:#050505;
color:white;
font-family:Tahoma;
padding:20px;
}

.box{
background:#202020;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:none;

}

button{

width:100%;
padding:14px;
background:#ff1d1d;
color:white;
border:none;
border-radius:10px;
font-size:18px;

}

.address{

background:#111;
padding:12px;
border-radius:8px;
word-break:break-all;

}

.timer{

font-size:22px;
text-align:center;
margin:15px 0;

}

</style>

</head>

<body>


<h2>إيداع</h2>


<div class="box">

<label>اختر الشبكة</label>

<select id="network">

<option value="">اختر</option>

<option value="USDT_TRC20">USDT TRC20</option>

<option value="USDT_BEP20">USDT BEP20</option>

<option value="USDT_ERC20">USDT ERC20</option>

<option value="USDC_BEP20">USDC BEP20</option>

<option value="USDC_ERC20">USDC ERC20</option>

<option value="BTC">BTC</option>

<option value="ETH">ETH</option>

</select>


<label>المبلغ</label>

<input id="amount" type="number" placeholder="ادخل المبلغ">


<button onclick="createDeposit()">فتح طلب الإيداع</button>

</div>


<div class="box" id="depositBox" style="display:none">


<h3>عنوان الإيداع</h3>

<div class="address" id="address"></div>

<div class="timer" id="timer">15:00</div>


<label>TXID</label>

<input id="txid" placeholder="اكتب رقم العملية">


<label>رفع صورة الإيصال</label>

<input type="file" id="receipt">


<button onclick="submitProof()">ارسال الإثبات</button>

</div>


<script>

let requestId = null

let timerInterval


function startTimer(seconds){

let time = seconds

timerInterval = setInterval(()=>{

let minutes = Math.floor(time/60)

let sec = time % 60

document.getElementById("timer").innerText = 
minutes.toString().padStart(2,"0") + ":" +
sec.toString().padStart(2,"0")

time--

if(time<0){

clearInterval(timerInterval)

alert("انتهى وقت الإيداع")

}

},1000)

}


async function createDeposit(){

let email = localStorage.getItem("email")

let network = document.getElementById("network").value

let amount = document.getElementById("amount").value


let res = await fetch("/create-deposit-request",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email,
networkKey:network,
amount:amount

})

})

let data = await res.json()

if(data.request){

requestId = data.request.request_id

document.getElementById("depositBox").style.display="block"

document.getElementById("address").innerText =
data.request.deposit_address

startTimer(900)

}

else{

alert(data.message)

}

}



async function submitProof(){

let email = localStorage.getItem("email")

let txid = document.getElementById("txid").value

let receipt = document.getElementById("receipt").files[0]

let form = new FormData()

form.append("email",email)

form.append("requestId",requestId)

form.append("txid",txid)

form.append("receiptImage",receipt)


let res = await fetch("/submit-deposit-proof",{

method:"POST",

body:form

})

let data = await res.json()

alert(data.message)

}

</script>

</body>
</html>
